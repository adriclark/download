name: Download My File

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download File
        run: wget -O my-file.zip "https://download.microsoft.com/download/8/4/a/84a35bf1-dafe-4ae8-82af-ad2ae20b6b14/directx_Jun2010_redist.exe"
      
      - name: Split file into 90MB parts
        run: |
          split -b 90m my-file.zip part_
          echo "Split completed. Parts created:"
          ls -la part_*
      
      - name: Upload parts as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: file-parts
          path: part_*
