name: Download My File

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download File
        run: wget -O my-file.zip "https://drivers.plus/get/6/1/5/5/8/13-1-legacy_vista_win7_win8_64_dd_ccc.exe"
      
      - name: Split file into 90MB parts
        run: |
          split -b 90m my-file.zip part_
          echo "Split completed. Parts created:"
          ls -la part_*
      
      - name: Upload parts as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: file-parts
          path: part_*
